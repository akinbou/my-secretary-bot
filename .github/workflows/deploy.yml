name: Deploy Python Lambda (Docker Build)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build dependencies in Lambda-like Docker container
        run: |
          # Lambdaと同じ環境(Python 3.12)のコンテナを立ち上げて、その中でpip installする
          docker run --rm -v $(pwd):/var/task public.ecr.aws/sam/build-python3.12:latest \
            pip install -r requirements.txt -t /var/task/package

      - name: Zip package and code
        run: |
          cd package
          zip -r ../deployment_package.zip .
          cd ..
          zip deployment_package.zip lambda_function.py

      - name: Deploy to AWS Lambda
        uses: appleboy/lambda-action@master
        with:
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_region: ap-northeast-1
          function_name: my-secretary-bot
          zip_file: deployment_package.zip
